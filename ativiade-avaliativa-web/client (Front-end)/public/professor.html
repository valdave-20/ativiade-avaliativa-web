<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Área do Professor - Projeto de Atividades</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1 id="welcomeTitle">Área do Professor</h1>
        <nav>
          <a href="index.html" onclick="localStorage.removeItem('user')">Sair</a>
        </nav>
      </header>

      <main>
        <section class="card">
          <h2>Criar Nova Matéria</h2>
          <form id="subjectForm">
            <label for="subName">Nome da Matéria</label>
            <input id="subName" type="text" placeholder="Ex: Biologia" required />
            
            <label for="subDesc">Descrição</label>
            <textarea id="subDesc" placeholder="Breve descrição..."></textarea>
            
            <button type="submit">Salvar Matéria</button>
          </form>
        </section>

        <section class="card">
          <h2>Matérias Existentes</h2>
          <ul id="subjectsList">
            <li>Carregando...</li>
          </ul>
        </section>
      </main>
    </div>

    <script>
      const user = JSON.parse(localStorage.getItem('user'));
      if (!user || user.role !== 'teacher') {
        window.location.href = 'index.html';
      } else {
        document.getElementById('welcomeTitle').innerText = `Painel do Prof. ${user.name}`;
      }

      const subjectForm = document.getElementById('subjectForm');
      subjectForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('subName').value;
        const description = document.getElementById('subDesc').value;

        try {
          const response = await fetch('/subjects', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, description })
          });

          if (response.ok) {
            alert('Matéria criada!');
            subjectForm.reset();
            loadSubjects();
          } else {
            alert('Erro ao criar matéria');
          }
        } catch (error) {
          console.error(error);
        }
      });

      async function loadSubjects() {
        try {
          const response = await fetch('/subjects');
          const subjects = await response.json();
          const list = document.getElementById('subjectsList');
          list.innerHTML = '';

          subjects.forEach(sub => {
            const li = document.createElement('li');
            li.style.marginBottom = '10px';
            li.innerHTML = `<strong>${sub.name}</strong> - ${sub.description || ''}`;
            list.appendChild(li);
          });
        } catch (error) {
          console.error(error);
        }
      }

      loadSubjects();
    </script>
  </body>
</html>
