<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Área do Aluno - Projeto de Atividades</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1 id="welcomeTitle">Área do Aluno</h1>
        <nav>
          <a href="index.html" onclick="localStorage.removeItem('user')">Sair</a>
        </nav>
      </header>

      <main>
        <section class="card">
          <h2>Minhas Matérias</h2>
          <ul id="subjectsList">
            <li>Carregando matérias...</li>
          </ul>
        </section>

        <section class="card">
          <h2>Atividades Recentes</h2>
          <div id="activitiesList">
            <p>Selecione uma matéria para ver as atividades.</p>
          </div>
        </section>
      </main>
    </div>

    <script>
      // Verifica se o usuário está logado
      const user = JSON.parse(localStorage.getItem('user'));
      if (!user || user.role !== 'student') {
        window.location.href = 'index.html';
      } else {
        document.getElementById('welcomeTitle').innerText = `Bem-vindo, ${user.name}`;
      }

      async function loadSubjects() {
        try {
          const response = await fetch('/subjects');
          const subjects = await response.json();
          const list = document.getElementById('subjectsList');
          list.innerHTML = '';

          subjects.forEach(sub => {
            const li = document.createElement('li');
            li.innerHTML = `<a href="#" onclick="loadActivities(${sub.id}, '${sub.name}')">${sub.name}</a>`;
            list.appendChild(li);
          });
        } catch (error) {
          console.error('Erro ao carregar matérias:', error);
        }
      }

      async function loadActivities(subjectId, subjectName) {
        const div = document.getElementById('activitiesList');
        div.innerHTML = `<p>Carregando atividades de ${subjectName}...</p>`;

        try {
          const response = await fetch(`/activities/subject/${subjectId}`);
          const activities = await response.json();
          
          div.innerHTML = `<h3>Atividades de ${subjectName}</h3>`;
          if (activities.length === 0) {
            div.innerHTML += '<p>Nenhuma atividade encontrada para esta matéria.</p>';
          } else {
            activities.forEach(act => {
              const card = document.createElement('div');
              card.className = 'activity-item';
              card.style.border = '1px solid #ddd';
              card.style.padding = '10px';
              card.style.marginBottom = '10px';
              card.style.borderRadius = '5px';
              card.innerHTML = `
                <h4>${act.title}</h4>
                <p>${act.description || 'Sem descrição'}</p>
                <small>Prazo: ${new Date(act.due_date).toLocaleDateString()}</small>
                <br>
                <button onclick="alert('Funcionalidade de resposta em breve!')">Responder</button>
              `;
              div.appendChild(card);
            });
          }
        } catch (error) {
          console.error('Erro ao carregar atividades:', error);
        }
      }

      loadSubjects();
    </script>
  </body>
</html>
