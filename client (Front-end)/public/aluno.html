<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <!-- Configurações de página e responsividade -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Área do Aluno</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <!-- Cabeçalho com título específico para aluno -->
      <header>
        <h1>Área do Aluno</h1>
        <p>Veja suas matérias e responda as atividades.</p>
      </header>

      <main>
        <!-- Lista de matérias que o aluno pode acessar -->
        <section class="card">
          <h2>Minhas Matérias</h2>
          <ul class="list">
            <li>Matemática</li>
            <li>Português</li>
            <li>História</li>
          </ul>
        </section>

        <!-- Exemplo de atividade recebida -->
        <section class="card">
          <h2>Atividades Recebidas</h2>
          <article class="activity">
            <h3>Exercício de Álgebra</h3>
            <p>Resolva as equações abaixo e envie até 10/06.</p>
            <button>Responder</button>
          </article>
        </section>
      </main>

      <!-- Link para voltar ao login -->
      <footer>
        <a href="index.html">Voltar para login</a>
      </footer>
    </div>
  </body>
</html>
